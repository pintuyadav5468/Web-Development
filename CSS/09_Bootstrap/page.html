<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d10;
            --panel: #16161c;
            --line: #2a2a34;
            --accent: #2c4a7c;
        }

        body {
            background: var(--bg);
            color: #f1f1f1;
        }

        .hero-carousel {
            background: var(--panel);
            border-radius: 16px;
            overflow: hidden;
        }

        .hero-slide {
            height: 340px;
            width: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-caption {
            text-shadow: 0 2px 8px rgba(0, 0, 0, .8);
        }

        .video-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .video-card .ratio {
            background: #000;
        }

        .video-card .body {
            padding: 1rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .video-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: .25rem;
        }

        .video-meta {
            color: #9a9aa5;
            font-size: .9rem;
            margin-bottom: 1rem;
        }

        .btn-watch {
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: .55rem 1rem;
            margin-top: auto;
            transition: filter .15s;
        }

        .btn-watch:hover {
            filter: brightness(1.2);
            color: #fff;
        }

        footer {
            background: var(--panel);
            border-radius: 12px;
        }

        @media (max-width:575.98px) {
            .hero-slide {
                height: 200px;
            }
        }
    </style>
</head>

<body>
    <div class="container py-4" style="max-width:1100px;">

        <!-- Carousel -->
        <div id="hero" class="carousel slide hero-carousel mb-4" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://images.pexels.com/photos/14553704/pexels-photo-14553704.jpeg?auto=compress&cs=tinysrgb&w=1100"
                        class="hero-slide" alt="Code on screen">
                    <div class="carousel-caption">
                        <h1 class="fw-bold">Featured</h1>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://images.pexels.com/photos/34803990/pexels-photo-34803990.jpeg?auto=compress&cs=tinysrgb&w=1100"
                        class="hero-slide" alt="Laptop displaying debugging software">
                    <div class="carousel-caption">
                        <h1 class="fw-bold">Trending Now</h1>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://images.pexels.com/photos/6804613/pexels-photo-6804613.jpeg?auto=compress&cs=tinysrgb&w=1100"
                        class="hero-slide" alt="Developer workspace">
                    <div class="carousel-caption">
                        <h1 class="fw-bold">New Uploads</h1>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#hero" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span></button>
            <button class="carousel-control-next" type="button" data-bs-target="#hero" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span></button>
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#hero" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#hero" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#hero" data-bs-slide-to="2"></button>
            </div>
        </div>

        <!-- Cards: row stacks on mobile, 3-up on >=md -->
        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <div class="video-card">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video"
                            allowfullscreen></iframe>
                    </div>
                    <div class="body">
                        <div class="video-title">YouTube Card</div>
                        <div class="video-meta">Short description of the video.</div>
                        <a class="btn-watch text-center" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                            target="_blank" rel="noopener">Watch now</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="video-card">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/9bZkp7q19f0" title="YouTube video"
                            allowfullscreen></iframe>
                    </div>
                    <div class="body">
                        <div class="video-title">YouTube Card</div>
                        <div class="video-meta">Short description of the video.</div>
                        <a class="btn-watch text-center" href="https://www.youtube.com/watch?v=9bZkp7q19f0"
                            target="_blank" rel="noopener">Watch now</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="video-card">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ" title="YouTube video"
                            allowfullscreen></iframe>
                    </div>
                    <div class="body">
                        <div class="video-title">YouTube Card</div>
                        <div class="video-meta">Short description of the video.</div>
                        <a class="btn-watch text-center" href="https://www.youtube.com/watch?v=3JZ_D3ELwOQ"
                            target="_blank" rel="noopener">Watch now</a>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center py-3">copyright &ndash; Yourname</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
