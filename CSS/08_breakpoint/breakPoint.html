<!DOCTYPE html>
<html lang="en">
<head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BreakPoint</title>
            <style>
                        body {
                                    font-family:  Arial, Helvetica, sans-serif;
                                    margin: 0;
                                    padding: 0;
                                    display: flex;
                                    justify-content: center;
                                    align-items: center;
                                    height: 100vh;
                                    background-color: #1a1a1a;

                        }
                        .responsive-design {
                                    width: 100%;
                                    max-width: 1200px;
                                    padding: 20px;
                                    color: #fff;
                                    font-size: 26px;
                                    background-color: #7e0a93;
                                    
                        }
                        @medai (max-width: 768px) {
                                    body {
                                                align-items: flex-start;
                                    }
                                    .responsive-design {
                                                background-color: #0a937e;
                                    }
                        }
                        @media (min-width: 769px) and (max-width: 1200px) {
                                    .responsive-design {
                                                background-color: #937e0a;
                                    }
                        }

            </style>
</head>
<body>
            
           <div class="responsive-design">
            this div changes the color based on the screen size. Resize the browser window to see the effect.
           </div>


</body>
</html>
